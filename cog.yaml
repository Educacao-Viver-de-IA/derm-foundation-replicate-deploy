build:
  gpu: false
  python_version: "3.11"
  python_packages:
    # CPU pod — derm-foundation gera embeddings (operação leve)
    - "tensorflow==2.16.2"
    - "keras>=3.0"
    - "huggingface_hub>=0.24.0"
    - "pillow>=10.0.0"
    - "numpy>=1.26.0"
  system_packages:
    - libgl1
    - libglib2.0-0
  run:
    # google/derm-foundation é GATED — user precisa aceitar licença na conta HF
    - command: python -c "import os; os.environ['HF_TOKEN']=open('/run/secrets/HF_TOKEN').read().strip(); from huggingface_hub import snapshot_download; snapshot_download(repo_id='google/derm-foundation', local_dir='/src/weights/derm-foundation', token=os.environ['HF_TOKEN'])"
      mounts:
        - type: secret
          id: HF_TOKEN
          target: /run/secrets/HF_TOKEN

predict: "predict.py:Predictor"
